<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="UTF-8">
  <title>多人协作文档测试</title>
  <!-- 引入 Quill 编辑器的样式 -->
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
    }

    #editor-container {
      height: 300px;
      background: #fff;
    }

    .status {
      margin-bottom: 10px;
      color: #666;
    }

    #status-tag {
      font-weight: bold;
    }
  </style>
</head>

<body>

  <h2>多人协作测试</h2>
  <div class="status">状态: <span id="status-tag">连接中...</span></div>

  <!-- 编辑器容器 -->
  <div id="editor-container"></div>

  <!-- 配置脚本 -->
  <script type="module">
    import * as Y from 'https://esm.sh/yjs@13.6.30';
    import { WebsocketProvider } from 'https://esm.sh/y-websocket@1.5.0';
    import { QuillBinding } from 'https://esm.sh/y-quill@0.1.5';
    import Quill from 'https://esm.sh/quill@1.3.6';

    const ydoc = new Y.Doc();

    const docId = 'ab4003dd-ca3f-446d-874b-e6944a26f99a';
    const token = '97467319-88a6-46c7-aaad-e8b33087f766';
    const userId = 'U93447670943';
    const provider = new WebsocketProvider(
      'ws://localhost:3000',
      docId,
      ydoc,
      {
        params: {
          token,
          userId
        }
      }
    );

    const statusTag = document.getElementById('status-tag');
    provider.on('status', event => {
      statusTag.textContent = event.status === 'connected' ? '已连接 (3000端口)' : '断开连接';
      statusTag.style.color = event.status === 'connected' ? 'green' : 'red';
    });

    const quill = new Quill('#editor-container', {
      modules: { toolbar: true },
      placeholder: '输入内容，邀请别人一起编辑...',
      theme: 'snow'
    });

    // 5. 将 Yjs 的文本对象与 Quill 编辑器绑定
    const ytext = ydoc.getText('quill'); // 这里的 'quill' 是数据存储的 key
    const binding = new QuillBinding(ytext, quill, provider.awareness);

    // 为了方便调试，把 ydoc 挂在 window 上
    window.ydoc = ydoc;
  </script>
</body>

</html>
